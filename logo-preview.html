<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>和美人 Logo — Red Version Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0E0C0A;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 64px;
    font-family: Georgia, serif; padding: 48px;
  }
  h2 { color: #4A4038; font-size: 11px; letter-spacing: 3px; font-weight: 400; margin-bottom: 16px; text-align: center; }

  .logo-wrap {
    background: #C0392B;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .logo-wrap img {
    position: absolute;
    width: 90%; height: auto;
    left: 5%; top: -2%;
    mix-blend-mode: multiply;
    filter: grayscale(1) contrast(1.5) brightness(0.82) sepia(0.15);
  }
  .logo-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(201,168,76,0.12) 0%, transparent 55%);
    mix-blend-mode: overlay;
    pointer-events: none;
  }

  .sizes { display: flex; flex-direction: row; gap: 56px; align-items: flex-end; }
  .row   { display: flex; flex-direction: column; align-items: center; }

  /* Header mockup */
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 28px;
    border: 1px solid #2E2820; border-radius: 10px;
    background: rgba(14,12,10,0.95);
  }
  .brand { color: #EDE8DF; font-size: 18px; letter-spacing: 0.08em; }
  .beta  { color: #C0392B; border: 1px solid rgba(192,57,43,0.3); border-radius: 3px; padding: 1px 5px; font-size: 9px; letter-spacing: 1.5px; font-family: monospace; }
  .time  { color: #4A4038; font-size: 10px; border-left: 1px solid #2E2820; padding-left: 10px; letter-spacing: 0.15em; }
</style>
</head>
<body>

<!-- Header context -->
<div class="row">
  <h2>HEADER CONTEXT</h2>
  <div class="header">
    <div class="logo-wrap" style="width:32px;height:32px;border-radius:6px;">
      <img src="public/logo-bijin.png" alt="">
    </div>
    <span class="brand">Sakura</span>
    <span class="beta">BETA</span>
    <span class="time">夜</span>
  </div>
</div>

<!-- Sizes -->
<div class="row">
  <h2>SIZES</h2>
  <div class="sizes">

    <div class="row">
      <h2>32 px</h2>
      <div class="logo-wrap" style="width:32px;height:32px;border-radius:6px;">
        <img src="public/logo-bijin.png" alt="">
      </div>
    </div>

    <div class="row">
      <h2>88 px</h2>
      <div class="logo-wrap" style="width:88px;height:88px;border-radius:16px;">
        <img src="public/logo-bijin.png" alt="">
      </div>
    </div>

    <div class="row">
      <h2>200 px</h2>
      <div class="logo-wrap" style="width:200px;height:200px;border-radius:28px;">
        <img src="public/logo-bijin.png" alt="">
      </div>
    </div>

  </div>
</div>

</body>
</html>
